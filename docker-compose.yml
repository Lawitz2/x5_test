version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: x5_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: x5_test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: x5_test_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      HTTP_PORT: 8080
      GRPC_PORT: 50051
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: x5_test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL_MODE: disable
      MIGRATIONS_DIR: migrations

volumes:
  postgres_data: