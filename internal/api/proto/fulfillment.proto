syntax = "proto3";

package fulfillment;

option go_package = "x5_test/api/proto";

service FulfillmentService {
  rpc ProcessOrder(ProcessOrderRequest) returns (ProcessOrderResponse);
}

message OrderItem {
  string sku = 1;
  int32 qty = 2;
}

message ProcessOrderRequest {
  string order_id = 1;
}

message ProcessOrderResponse {
  string status = 1;
  string message = 2;
}
